<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">buttons</div>
<div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
  <button style="font-family:inherit; font-size:13px; font-weight:500; background:var(--k-green); color:#071a0e; border:1px solid var(--k-green); padding:8px 14px; border-radius:2px; cursor:pointer;">run build</button>
  <button style="font-family:inherit; font-size:13px; font-weight:500; background:transparent; color:var(--fg-1); border:1px solid var(--border-hover); padding:8px 14px; border-radius:2px; cursor:pointer;">cancel</button>
  <button style="font-family:inherit; font-size:13px; font-weight:500; background:transparent; color:var(--fg-2); border:1px dashed var(--border); padding:8px 14px; border-radius:2px; cursor:pointer;">-- idle --</button>
  <button style="font-family:inherit; font-size:13px; font-weight:500; background:var(--k-red); color:#1a0707; border:1px solid var(--k-red); padding:8px 14px; border-radius:2px; cursor:pointer;">rm -rf</button>
  <button style="font-family:inherit; font-size:13px; font-weight:500; background:transparent; color:var(--fg-3); border:1px solid var(--border); padding:8px 14px; border-radius:2px; opacity:0.5;">disabled</button>
</div>
<div style="margin-top:14px; display:flex; gap:10px; align-items:center;">
  <button style="font-family:inherit; font-size:11px; background:transparent; color:var(--fg-2); border:1px solid var(--border); padding:4px 10px; border-radius:2px; cursor:pointer;">sm · tag</button>
  <button style="font-family:inherit; font-size:11px; background:transparent; color:var(--k-cyan); border:1px solid var(--border); padding:4px 10px; border-radius:2px; cursor:pointer;">◆ filter</button>
  <button style="font-family:inherit; font-size:11px; background:transparent; color:var(--fg-1); border:0; padding:4px 6px; cursor:pointer; text-decoration:underline; text-underline-offset:3px;">view logs →</button>
</div>
</div></body></html>
