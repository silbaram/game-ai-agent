<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
</style>
</head><body><div class="card">
<div class="label">card pattern</div>
<div style="display:flex; gap:12px;">
  <div style="flex:1; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:14px 16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <div style="font-size:12px; font-weight:500;">api</div>
      <span style="color:var(--k-green); font-size:11px;">● running</span>
    </div>
    <div style="font-size:11px; color:var(--fg-2); line-height:1.6;">
      port :4001 · pid 8842<br/>
      mem 142MB · cpu 4%
    </div>
    <div style="border-top:1px solid var(--border); margin-top:10px; padding-top:8px; font-size:11px; color:var(--fg-3);">
      logs · restart · stop
    </div>
  </div>
  <div style="flex:1; background:var(--bg-1); border:1px solid var(--border-hover); border-radius:2px; padding:14px 16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <div style="font-size:12px; font-weight:500;">worker</div>
      <span style="color:var(--k-amber); font-size:11px;">◐ degraded</span>
    </div>
    <div style="font-size:11px; color:var(--fg-2); line-height:1.6;">
      no port · pid 8843<br/>
      mem 320MB · cpu 62%
    </div>
    <div style="border-top:1px solid var(--border); margin-top:10px; padding-top:8px; font-size:11px; color:var(--fg-3);">
      hover state ↑
    </div>
  </div>
</div>
</div></body></html>
