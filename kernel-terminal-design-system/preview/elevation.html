<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">elevation · flat + optional glow</div>
<div style="display:flex; gap:12px;">
  <div style="flex:1; padding:20px 14px; background:var(--bg-1); border:1px solid var(--border); border-radius:2px;">
    <div style="font-size:12px; color:var(--fg-1);">panel</div>
    <div style="font-size:10px; color:var(--fg-3); margin-top:4px;">no shadow</div>
  </div>
  <div style="flex:1; padding:20px 14px; background:var(--bg-2); border:1px solid var(--border); border-radius:2px;">
    <div style="font-size:12px; color:var(--fg-1);">raised</div>
    <div style="font-size:10px; color:var(--fg-3); margin-top:4px;">bg-2, still flat</div>
  </div>
  <div style="flex:1; padding:20px 14px; background:var(--bg-1); border:1px solid var(--k-green); border-radius:2px; box-shadow: 0 0 0 1px var(--k-green), 0 0 12px rgba(0,226,107,0.25);">
    <div style="font-size:12px; color:var(--k-green);">focus-glow</div>
    <div style="font-size:10px; color:var(--fg-3); margin-top:4px;">only "elevation"</div>
  </div>
</div>
</div></body></html>
