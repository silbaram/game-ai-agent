<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.row { display: flex; gap: 12px; align-items: stretch; }
.swatch { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 2px; padding: 10px 12px; font-size: 11px; line-height: 1.4; }
.swatch .name { color: var(--fg-1); font-weight: 500; }
.swatch .hex { color: var(--fg-3); margin-top: 2px; font-size: 10px; letter-spacing: 0.02em; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 8px; }
</style>
</head><body><div class="card">
<div class="label">core · neutrals</div>
<div class="row">
  <div class="swatch" style="background:#0B0D0E"><div class="name">bg-0</div><div class="hex">#0B0D0E</div></div>
  <div class="swatch" style="background:#13161A"><div class="name">bg-1</div><div class="hex">#13161A</div></div>
  <div class="swatch" style="background:#1A1E23"><div class="name">bg-2</div><div class="hex">#1A1E23</div></div>
  <div class="swatch" style="background:#22272E"><div class="name">bg-3</div><div class="hex">#22272E</div></div>
  <div class="swatch" style="background:#2A2F36"><div class="name">line</div><div class="hex">#2A2F36</div></div>
  <div class="swatch" style="background:#3D434D"><div class="name">line-2</div><div class="hex">#3D434D</div></div>
</div>
<div style="height:12px"></div>
<div class="row">
  <div class="swatch" style="background:#5E6670"><div class="name" style="color:#0B0D0E">fg-3</div><div class="hex" style="color:#0B0D0E">#5E6670</div></div>
  <div class="swatch" style="background:#9AA3AD"><div class="name" style="color:#0B0D0E">fg-2</div><div class="hex" style="color:#0B0D0E">#9AA3AD</div></div>
  <div class="swatch" style="background:#E6E8EA"><div class="name" style="color:#0B0D0E">fg-1</div><div class="hex" style="color:#0B0D0E">#E6E8EA</div></div>
  <div class="swatch" style="background:#FFFFFF"><div class="name" style="color:#0B0D0E">ink-0</div><div class="hex" style="color:#0B0D0E">#FFFFFF</div></div>
</div>
</div></body></html>
