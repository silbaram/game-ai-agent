<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">prompts & cursor</div>
<div style="display:flex; flex-direction:column; gap:6px; font-size:14px; line-height:1.5;">
  <div><span style="color:var(--k-green); font-weight:500;">$ </span><span style="color:var(--fg-1);">user prompt (standard)</span></div>
  <div><span style="color:var(--k-red); font-weight:500;"># </span><span style="color:var(--fg-1);">root prompt (destructive context)</span></div>
  <div><span style="color:var(--k-green); font-weight:500;">❯ </span><span style="color:var(--fg-1);">modern prompt variant</span></div>
  <div><span style="color:var(--fg-3);">→ </span><span style="color:var(--fg-2);">output line (stdout)</span></div>
  <div><span style="color:var(--k-red);">! </span><span style="color:var(--fg-2);">stderr / warning line</span></div>
</div>
<div style="margin-top:14px; display:flex; gap:20px; align-items:center; font-size:11px; color:var(--fg-3);">
  <div style="display:flex; gap:8px; align-items:center;"><span style="display:inline-block; width:9px; height:16px; background:var(--fg-1); animation:k-blink 1s steps(1,end) infinite;"></span> block cursor</div>
  <div style="display:flex; gap:8px; align-items:center;"><span style="display:inline-block; width:2px; height:16px; background:var(--k-green); animation:k-blink 1s steps(1,end) infinite;"></span> beam cursor</div>
  <div style="display:flex; gap:8px; align-items:center;"><span style="display:inline-block; width:9px; height:2px; background:var(--fg-1); margin-top:14px; animation:k-blink 1s steps(1,end) infinite;"></span> underline</div>
</div>
</div></body></html>
