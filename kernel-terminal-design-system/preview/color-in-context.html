<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.row { display: flex; gap: 12px; align-items: stretch; }
.swatch { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 2px; padding: 10px 12px; font-size: 11px; line-height: 1.4; }
.swatch .name { color: var(--fg-1); font-weight: 500; }
.swatch .hex { color: var(--fg-3); margin-top: 2px; font-size: 10px; letter-spacing: 0.02em; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 8px; }
</style>
</head><body><div class="card">
<div class="label">colors · in context</div>
<div style="background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:14px 16px; font-size:12px; line-height:1.6;">
  <div><span style="color:var(--k-green)">$ </span><span style="color:var(--fg-1)">kernel deploy --env=prod</span></div>
  <div style="color:var(--fg-2)">  → resolving 14 modules</div>
  <div style="color:var(--fg-2)">  → building <span style="color:var(--k-cyan)">api</span>, <span style="color:var(--k-cyan)">worker</span>, <span style="color:var(--k-cyan)">web</span></div>
  <div style="color:var(--k-amber)">  warn: worker has 1 unused import</div>
  <div style="color:var(--k-green)">  ok: built in 3.2s</div>
  <div style="color:var(--k-red)">  error: missing env KERNEL_TOKEN</div>
  <div style="color:var(--fg-3)">         hint: run `kernel auth` or set in .env</div>
  <div><span style="color:var(--k-green)">$ </span><span class="cursor" style="background:var(--fg-1)"></span></div>
</div>
</div></body></html>
