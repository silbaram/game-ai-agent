<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">iconography · unicode-first</div>
<div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:10px; font-size:13px;">
  <div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">●</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">run</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">○</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">idle</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">◐</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">partial</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">✓</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">ok</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">✗</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">fail</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">◆</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">focus</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">◇</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">tag</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">►</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">play</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">→</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">next</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">←</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">prev</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">↑</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">up</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">↓</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">down</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">⇄</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">sync</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">⟳</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">reload</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">⚑</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">flag</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">⌘</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">cmd</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">─</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">dash</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">│</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">pipe</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">╭</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">tl</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">╮</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">tr</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">╰</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">bl</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">╯</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">br</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">├</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">tee</div>
    </div><div style="text-align:center; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 0;">
      <div style="font-size:16px; color:var(--k-green); line-height:1;">┼</div>
      <div style="font-size:9px; color:var(--fg-3); margin-top:4px;">cross</div>
    </div>
</div>
</div></body></html>
