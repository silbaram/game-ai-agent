<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
</style>
</head><body><div class="card">
<div class="label">menu · dropdown</div>
<div style="display:flex; gap:16px;">
  <div style="width:240px; background:var(--bg-1); border:1px solid var(--border-hover); border-radius:2px; padding:4px 0; font-size:12px;">
    <div style="padding:6px 12px; color:var(--fg-3); font-size:10px; text-transform:uppercase; letter-spacing:0.08em;">file</div>
    <div style="padding:6px 12px; display:flex; justify-content:space-between; background:var(--k-green-a); color:var(--fg-1);">
      <span>new session</span><span style="color:var(--fg-3);">⌘N</span>
    </div>
    <div style="padding:6px 12px; display:flex; justify-content:space-between; color:var(--fg-1);">
      <span>open...</span><span style="color:var(--fg-3);">⌘O</span>
    </div>
    <div style="padding:6px 12px; display:flex; justify-content:space-between; color:var(--fg-1);">
      <span>save log</span><span style="color:var(--fg-3);">⌘S</span>
    </div>
    <div style="border-top:1px solid var(--border); margin:4px 0;"></div>
    <div style="padding:6px 12px; display:flex; justify-content:space-between; color:var(--fg-3);">
      <span>export...</span><span>⇧⌘E</span>
    </div>
    <div style="padding:6px 12px; display:flex; justify-content:space-between; color:var(--k-red);">
      <span>kill process</span><span style="color:var(--fg-3);">⌃C</span>
    </div>
  </div>
  <div style="flex:1; font-size:11px; color:var(--fg-3); line-height:1.6;">
    • 1px border<br/>
    • hover = accent-bg 18% alpha<br/>
    • separator = 1px line, no padding<br/>
    • keybind right-aligned fg-3
  </div>
</div>
</div></body></html>
