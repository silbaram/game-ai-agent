<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>kernel — a terminal for people who ship</title>
<link rel="icon" href="../../assets/favicon.svg">
<style>
/* ==========================================================================
   Kernel Terminal Design System — colors & type tokens
   Dark-first. Monospace-first. 4px spacing grid.
   ========================================================================== */

@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");

:root {
  /* ----- Base palette (raw) ----- */
  --k-black: #0B0D0E;        /* root bg */
  --k-panel: #13161A;        /* card / panel bg */
  --k-panel-2: #1A1E23;      /* elevated panel */
  --k-panel-3: #22272E;      /* hovered panel */

  --k-ink-0: #FFFFFF;        /* hi-contrast */
  --k-ink-1: #E6E8EA;        /* body */
  --k-ink-2: #9AA3AD;        /* secondary */
  --k-ink-3: #5E6670;        /* muted */
  --k-ink-4: #3D434D;        /* very dim */
  --k-line:  #2A2F36;        /* borders */
  --k-line-2: #3D434D;       /* hover border */

  /* ----- Phosphor + ANSI accents ----- */
  --k-green:   #00E26B;      /* primary accent / prompt / focus */
  --k-green-d: #00B856;      /* pressed */
  --k-green-a: rgba(0, 226, 107, 0.18);

  --k-amber:   #FFB000;      /* warn / highlight */
  --k-amber-a: rgba(255, 176, 0, 0.18);

  --k-red:     #FF4D4D;      /* error */
  --k-red-a:   rgba(255, 77, 77, 0.18);

  --k-cyan:    #5DD3FF;      /* info / links */
  --k-cyan-a:  rgba(93, 211, 255, 0.18);

  --k-magenta: #E066E0;      /* rare accent */
  --k-blue:    #6C9BFF;      /* secondary info */

  /* ----- Semantic (map raw → role) ----- */
  --fg-1: var(--k-ink-1);
  --fg-2: var(--k-ink-2);
  --fg-3: var(--k-ink-3);
  --fg-4: var(--k-ink-4);
  --fg-accent: var(--k-green);

  --bg-0: var(--k-black);
  --bg-1: var(--k-panel);
  --bg-2: var(--k-panel-2);
  --bg-3: var(--k-panel-3);

  --border: var(--k-line);
  --border-hover: var(--k-line-2);
  --border-focus: var(--k-green);

  --success: var(--k-green);
  --warn:    var(--k-amber);
  --error:   var(--k-red);
  --info:    var(--k-cyan);

  /* Selection + focus */
  --selection-bg: var(--k-green-a);
  --focus-ring: var(--k-green);

  /* ----- Type families ----- */
  --font-mono: "JetBrains Mono", "IBM Plex Mono", "SF Mono", Menlo,
               Consolas, "Courier New", monospace;
  --font-sans: "IBM Plex Sans", "IBM Plex Sans KR", -apple-system,
               BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-kr-mono: "JetBrains Mono", "IBM Plex Sans KR", monospace; /* KR fallback when mono doesn't cover CJK */

  /* ----- Type scale (px) ----- */
  --fs-10: 10px;   /* micro / labels */
  --fs-12: 12px;   /* terminal default */
  --fs-13: 13px;   /* dense UI */
  --fs-14: 14px;   /* UI default */
  --fs-16: 16px;   /* body */
  --fs-20: 20px;   /* h3 */
  --fs-28: 28px;   /* h2 */
  --fs-40: 40px;   /* h1 / hero */
  --fs-56: 56px;   /* display */

  /* Line heights */
  --lh-tight: 1.2;
  --lh-ui:    1.4;
  --lh-mono:  1.5;
  --lh-prose: 1.6;

  /* Weights — JetBrains Mono ships 400/500/700 */
  --fw-regular: 400;
  --fw-medium:  500;
  --fw-bold:    700;

  /* ----- Spacing (4px base) ----- */
  --sp-0: 0px;
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 6px;
  --sp-4: 8px;
  --sp-5: 12px;
  --sp-6: 16px;
  --sp-7: 24px;
  --sp-8: 32px;
  --sp-9: 48px;
  --sp-10: 64px;

  /* ----- Radii ----- */
  --r-0: 0px;
  --r-1: 2px;
  --r-2: 4px;      /* cap — don't go higher */

  /* ----- Borders ----- */
  --bw: 1px;

  /* ----- Shadows (glow only; no drop shadows) ----- */
  --glow-focus: 0 0 0 1px var(--k-green), 0 0 12px rgba(0, 226, 107, 0.25);
  --glow-amber: 0 0 0 1px var(--k-amber), 0 0 12px rgba(255, 176, 0, 0.25);
  --glow-red:   0 0 0 1px var(--k-red),   0 0 12px rgba(255, 77, 77, 0.30);

  /* ----- Motion ----- */
  --dur-fast: 80ms;
  --dur-ui:   140ms;
  --dur-slow: 240ms;
  --ease-step: steps(1, end);
  --ease-linear: linear;
  --ease-ui: cubic-bezier(0.2, 0.0, 0.2, 1);

  /* Terminal cell (for character-grid thinking) */
  --cell-w: 7.2px;   /* at 14px mono */
  --cell-h: 21px;    /* 14 * 1.5 */
  --content-ch: 88ch;
}

/* ==========================================================================
   Semantic element styles
   Import this stylesheet and tokens + element rules are available.
   ========================================================================== */

html, body {
  background: var(--bg-0);
  color: var(--fg-1);
  font-family: var(--font-mono);
  font-size: var(--fs-14);
  line-height: var(--lh-mono);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection { background: var(--selection-bg); color: var(--fg-1); }

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-mono);
  font-weight: var(--fw-medium);
  line-height: var(--lh-tight);
  color: var(--fg-1);
  margin: 0;
  letter-spacing: -0.01em;
}
h1 { font-size: var(--fs-40); font-weight: var(--fw-bold); }
h2 { font-size: var(--fs-28); font-weight: var(--fw-bold); }
h3 { font-size: var(--fs-20); font-weight: var(--fw-medium); }
h4 { font-size: var(--fs-16); font-weight: var(--fw-medium); }
h5 { font-size: var(--fs-14); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-2); }
h6 { font-size: var(--fs-12); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); }

p  { margin: 0; font-size: var(--fs-14); color: var(--fg-1); }
.p-prose { font-family: var(--font-sans); font-size: var(--fs-16); line-height: var(--lh-prose); color: var(--fg-1); }

small, .caption {
  font-size: var(--fs-12);
  color: var(--fg-2);
}

code, pre, kbd, samp {
  font-family: var(--font-mono);
  font-size: 0.95em;
}

code {
  background: var(--bg-2);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-1);
  padding: 1px 6px;
  color: var(--fg-1);
}
pre {
  background: var(--bg-1);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-1);
  padding: var(--sp-5) var(--sp-6);
  color: var(--fg-1);
  overflow: auto;
  line-height: var(--lh-mono);
}
pre code { background: transparent; border: 0; padding: 0; }

kbd {
  display: inline-block;
  padding: 0 6px;
  font-size: var(--fs-12);
  background: var(--bg-2);
  border: var(--bw) solid var(--border);
  border-bottom-width: 2px;
  border-radius: var(--r-1);
  color: var(--fg-2);
}

a {
  color: var(--k-cyan);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}
a:hover { color: var(--fg-1); }

hr { border: 0; border-top: var(--bw) solid var(--border); margin: var(--sp-6) 0; }

/* Prompt utility — wrap user input lines */
.prompt::before {
  content: "$ ";
  color: var(--k-green);
  font-weight: var(--fw-medium);
}
.prompt-root::before { content: "# "; color: var(--k-red); }
.prompt-modern::before { content: "\2771  "; color: var(--k-green); }

/* Cursor */
.cursor {
  display: inline-block;
  width: 0.55em;
  height: 1em;
  vertical-align: -0.15em;
  background: var(--fg-1);
  animation: k-blink 1s steps(1, end) infinite;
}
@keyframes k-blink { 50% { background: transparent; } }

/* Status badges */
.status { display: inline-flex; align-items: center; gap: 6px; font-size: var(--fs-12); font-weight: var(--fw-medium); }
.status::before { content: "●"; font-size: 10px; line-height: 1; }
.status-ok::before  { color: var(--success); }
.status-warn::before{ color: var(--warn); }
.status-err::before { color: var(--error); }
.status-info::before{ color: var(--info); }
.status-idle::before{ color: var(--fg-3); }

html,body,#root{margin:0;padding:0;min-height:100%;background:var(--bg-0);}
*{box-sizing:border-box;}
a{cursor:pointer;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script type="text/babel" data-presets="react">

/* global React */
const { useState } = React;

function Nav({ route, setRoute }) {
  return (
    <div style={{ position:"sticky", top:0, zIndex:10, background:"rgba(11,13,14,0.85)", backdropFilter:"none",
      borderBottom:"1px solid var(--border)", height:56, display:"flex", alignItems:"center", padding:"0 24px", gap:28 }}>
      <div onClick={() => setRoute("home")} style={{ cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none">
          <rect x="1" y="1" width="46" height="46" rx="2" stroke="#E6E8EA" strokeWidth="3" fill="none"/>
          <path d="M10 16 L18 24 L10 32" stroke="#00E26B" strokeWidth="3" strokeLinecap="square" fill="none"/>
          <rect x="22" y="30" width="16" height="3" fill="#00E26B"/>
        </svg>
        <span style={{ fontSize:16, fontWeight:700, letterSpacing:"-0.02em" }}>kernel</span>
        <span style={{ fontSize:10, color:"var(--fg-3)", border:"1px solid var(--border)", padding:"1px 5px", borderRadius:2 }}>v1.4</span>
      </div>
      <div style={{ display:"flex", gap:20, fontSize:13 }}>
        {[["home","home"],["docs","docs"],["pricing","pricing"],["changelog","changelog"]].map(([k,l]) => (
          <a key={k} onClick={() => setRoute(k)} style={{ color: route===k ? "var(--fg-1)":"var(--fg-2)",
            cursor:"pointer", textDecoration:"none", borderBottom: route===k ? "1px solid var(--k-green)":"1px solid transparent", paddingBottom:2 }}>{l}</a>
        ))}
      </div>
      <div style={{ marginLeft:"auto", display:"flex", gap:10, alignItems:"center", fontSize:13 }}>
        <a style={{ color:"var(--fg-2)", textDecoration:"none" }}>github ↗</a>
        <button style={{ fontFamily:"inherit", fontSize:13, fontWeight:500, background:"var(--k-green)",
          color:"#071a0e", border:"1px solid var(--k-green)", padding:"6px 14px", borderRadius:2, cursor:"pointer" }}>sign in</button>
      </div>
    </div>
  );
}

function Hero() {
  return (
    <section style={{ padding:"80px 24px 48px", maxWidth:1120, margin:"0 auto", display:"grid",
      gridTemplateColumns:"1fr 1fr", gap:48, alignItems:"center" }}>
      <div>
        <div style={{ fontSize:11, color:"var(--k-green)", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:16 }}>● devtools · cli</div>
        <h1 style={{ fontSize:56, lineHeight:1.05, letterSpacing:"-0.02em", marginBottom:20 }}>
          a terminal for people<br/>who ship.
        </h1>
        <p className="p-prose" style={{ color:"var(--fg-2)", maxWidth:480, marginBottom:28 }}>
          kernel manages your services, logs, and deploys from one typed interface. no dashboards. no modals. just pipes.
        </p>
        <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:16 }}>
          <button style={{ fontFamily:"inherit", fontSize:13, fontWeight:500, background:"var(--k-green)",
            color:"#071a0e", border:"1px solid var(--k-green)", padding:"10px 18px", borderRadius:2, cursor:"pointer" }}>install kernel</button>
          <button style={{ fontFamily:"inherit", fontSize:13, background:"transparent", color:"var(--fg-1)",
            border:"1px solid var(--border-hover)", padding:"10px 18px", borderRadius:2, cursor:"pointer" }}>read docs →</button>
        </div>
        <div style={{ fontSize:12, color:"var(--fg-3)" }}>macOS · linux · wsl · no telemetry</div>
      </div>
      <div style={{ background:"var(--bg-1)", border:"1px solid var(--border)", borderRadius:2, overflow:"hidden" }}>
        <div style={{ height:30, background:"var(--bg-2)", borderBottom:"1px solid var(--border)",
          display:"flex", alignItems:"center", padding:"0 10px", gap:6 }}>
          <span style={{ width:10, height:10, borderRadius:2, background:"var(--k-red)" }}/>
          <span style={{ width:10, height:10, borderRadius:2, background:"var(--k-amber)" }}/>
          <span style={{ width:10, height:10, borderRadius:2, background:"var(--k-green)" }}/>
          <span style={{ marginLeft:10, color:"var(--fg-3)", fontSize:11 }}>~/work — zsh</span>
        </div>
        <div style={{ padding:16, fontSize:12, lineHeight:1.6 }}>
          <div><span style={{ color:"var(--k-green)" }}>$ </span>brew install kernel</div>
          <div style={{ color:"var(--fg-3)" }}>  → installed kernel v1.4.2</div>
          <div style={{ marginTop:8 }}><span style={{ color:"var(--k-green)" }}>$ </span>kernel init myapp</div>
          <div style={{ color:"var(--fg-3)" }}>  → created kernel.toml</div>
          <div style={{ color:"var(--fg-3)" }}>  → detected 3 services</div>
          <div style={{ marginTop:8 }}><span style={{ color:"var(--k-green)" }}>$ </span>kernel deploy</div>
          <div style={{ color:"var(--fg-3)" }}>  → building api, worker, web</div>
          <div style={{ color:"var(--k-green)" }}>  ok: built in 3.2s</div>
          <div style={{ color:"var(--k-green)" }}>  ok: deployed to prod.us-west-2</div>
          <div style={{ marginTop:4 }}><span style={{ color:"var(--k-green)" }}>$ </span><span style={{ display:"inline-block", width:9, height:14, background:"var(--fg-1)", verticalAlign:"-2px", animation:"k-blink 1s steps(1,end) infinite" }}/></div>
        </div>
      </div>
    </section>
  );
}

function Features() {
  const items = [
    { t:"one config", c:"kernel.toml describes every service. no dashboards to click through." },
    { t:"fast feedback", c:"sub-second rebuilds. structured output, grep-friendly by default." },
    { t:"pipes, not apis", c:"everything composes. kernel logs api | jq '.level' works." },
    { t:"secure by default", c:"tokens rotate on every deploy. secrets never leave your machine." },
    { t:"works offline", c:"no cloud required. kernel run --offline is first-class." },
    { t:"self-host or us", c:"single binary for self-host. or let us run it. same cli." },
  ];
  return (
    <section style={{ padding:"48px 24px", maxWidth:1120, margin:"0 auto" }}>
      <div style={{ fontSize:11, color:"var(--fg-3)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:16 }}>─ features</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:12 }}>
        {items.map((f, i) => (
          <div key={i} style={{ background:"var(--bg-1)", border:"1px solid var(--border)", borderRadius:2, padding:"20px 20px 22px" }}>
            <div style={{ fontSize:11, color:"var(--k-green)", marginBottom:10 }}>[{String(i+1).padStart(2,"0")}]</div>
            <div style={{ fontSize:16, fontWeight:500, marginBottom:8 }}>{f.t}</div>
            <div style={{ fontSize:13, color:"var(--fg-2)", lineHeight:1.5 }}>{f.c}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function CodeBlock() {
  return (
    <section style={{ padding:"48px 24px 80px", maxWidth:1120, margin:"0 auto" }}>
      <div style={{ fontSize:11, color:"var(--fg-3)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:16 }}>─ kernel.toml</div>
      <pre style={{ margin:0, background:"var(--bg-1)", border:"1px solid var(--border)", borderRadius:2,
        padding:"20px 24px", fontSize:13, lineHeight:1.6, overflow:"auto" }}>
<span style={{color:"var(--fg-3)"}}># every service in one file</span>{"\n"}
<span style={{color:"var(--k-cyan)"}}>[project]</span>{"\n"}
name = <span style={{color:"var(--k-green)"}}>"myapp"</span>{"\n"}
version = <span style={{color:"var(--k-green)"}}>"1.0.0"</span>{"\n"}{"\n"}
<span style={{color:"var(--k-cyan)"}}>[services.api]</span>{"\n"}
cmd = <span style={{color:"var(--k-green)"}}>"node server.js"</span>{"\n"}
port = <span style={{color:"var(--k-amber)"}}>4001</span>{"\n"}
env = <span style={{color:"var(--k-green)"}}>["DATABASE_URL", "KERNEL_TOKEN"]</span>{"\n"}{"\n"}
<span style={{color:"var(--k-cyan)"}}>[services.worker]</span>{"\n"}
cmd = <span style={{color:"var(--k-green)"}}>"node worker.js"</span>{"\n"}
restart = <span style={{color:"var(--k-green)"}}>"on-failure"</span>{"\n"}{"\n"}
<span style={{color:"var(--k-cyan)"}}>[deploy]</span>{"\n"}
target = <span style={{color:"var(--k-green)"}}>"prod.us-west-2"</span>{"\n"}
health = <span style={{color:"var(--k-green)"}}>"/healthz"</span>
      </pre>
    </section>
  );
}

function Docs() {
  const sections = [
    { h:"getting started", items:["installation","your first project","kernel.toml","running services"] },
    { h:"cli reference", items:["kernel run","kernel deploy","kernel logs","kernel auth","kernel rotate"] },
    { h:"guides", items:["migrating from docker","ci/cd","secrets management","multi-region"] },
  ];
  const [active, setActive] = useState("installation");
  return (
    <section style={{ display:"grid", gridTemplateColumns:"260px 1fr", minHeight:"calc(100vh - 56px)" }}>
      <aside style={{ borderRight:"1px solid var(--border)", padding:"24px 0", background:"var(--bg-1)" }}>
        {sections.map((s, i) => (
          <div key={i} style={{ marginBottom:18 }}>
            <div style={{ padding:"6px 20px", fontSize:10, color:"var(--fg-3)", textTransform:"uppercase", letterSpacing:"0.08em" }}>{s.h}</div>
            {s.items.map((it, j) => (
              <div key={j} onClick={() => setActive(it)} style={{
                padding:"5px 20px", fontSize:13, cursor:"pointer",
                background: active===it ? "var(--k-green-a)" : "transparent",
                color: active===it ? "var(--fg-1)" : "var(--fg-2)",
                borderLeft: active===it ? "2px solid var(--k-green)" : "2px solid transparent",
              }}>{it}</div>
            ))}
          </div>
        ))}
      </aside>
      <article style={{ padding:"40px 56px", maxWidth:820 }}>
        <div style={{ fontSize:11, color:"var(--fg-3)", marginBottom:10 }}>docs / getting started / <span style={{color:"var(--fg-1)"}}>{active}</span></div>
        <h1 style={{ fontSize:32, marginBottom:12, letterSpacing:"-0.01em" }}>{active}</h1>
        <p className="p-prose" style={{ color:"var(--fg-2)", marginBottom:24 }}>
          kernel runs on macOS, Linux, and WSL. install it with one command.
        </p>
        <pre style={{ margin:"0 0 20px", background:"var(--bg-1)", border:"1px solid var(--border)", borderRadius:2,
          padding:"14px 18px", fontSize:13 }}>
<span style={{color:"var(--k-green)"}}>$ </span>brew install kernel
          </pre>
        <h3 style={{ fontSize:20, fontWeight:500, margin:"24px 0 10px" }}>verify</h3>
        <p className="p-prose" style={{ color:"var(--fg-2)", marginBottom:14 }}>
          check that the binary is on your path.
        </p>
        <pre style={{ margin:"0 0 20px", background:"var(--bg-1)", border:"1px solid var(--border)", borderRadius:2,
          padding:"14px 18px", fontSize:13 }}>
<span style={{color:"var(--k-green)"}}>$ </span>kernel --version{"\n"}<span style={{color:"var(--fg-3)"}}>kernel v1.4.2 (darwin-arm64)</span>
          </pre>
        <div style={{ background:"var(--bg-1)", border:"1px solid var(--k-cyan)", borderLeft:"2px solid var(--k-cyan)",
          borderRadius:2, padding:"12px 16px", marginBottom:20 }}>
          <div style={{ fontSize:11, color:"var(--k-cyan)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>note</div>
          <div style={{ fontSize:13, color:"var(--fg-1)", lineHeight:1.5 }}>
            on linux, use the install script: <code>curl kernel.dev/install | sh</code>
          </div>
        </div>
        <h3 style={{ fontSize:20, fontWeight:500, margin:"24px 0 10px" }}>next</h3>
        <ul style={{ color:"var(--fg-2)", lineHeight:1.8, paddingLeft:20 }}>
          <li><a>create your first project →</a></li>
          <li><a>write kernel.toml →</a></li>
          <li><a>run services locally →</a></li>
        </ul>
      </article>
    </section>
  );
}

function Footer() {
  return (
    <footer style={{ borderTop:"1px solid var(--border)", padding:"32px 24px", maxWidth:1120, margin:"0 auto",
      display:"flex", justifyContent:"space-between", fontSize:12, color:"var(--fg-3)" }}>
      <div>kernel · <span style={{ color:"var(--fg-2)" }}>built for people who prefer pipes</span></div>
      <div style={{ display:"flex", gap:20 }}>
        <span>docs</span><span>github</span><span>changelog</span><span>terms</span>
      </div>
    </footer>
  );
}

function App() {
  const [route, setRoute] = useState("home");
  return (
    <div style={{ minHeight:"100vh", background:"var(--bg-0)", color:"var(--fg-1)" }}>
      <Nav route={route} setRoute={setRoute}/>
      {route === "home" && <><Hero/><Features/><CodeBlock/><Footer/></>}
      {route === "docs" && <Docs/>}
      {route === "pricing" && (
        <div style={{ padding:"120px 24px", textAlign:"center", color:"var(--fg-2)" }}>
          <div style={{ fontSize:48, color:"var(--fg-1)", marginBottom:20 }}>pay for what you ship</div>
          <div style={{ maxWidth:680, margin:"0 auto", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
            {[["hacker","$0","single machine"],["team","$12","per user · cloud"],["org","talk to us","sso · audit"]].map(([n,p,s],i)=>(
              <div key={i} style={{ background:"var(--bg-1)", border:"1px solid "+(i===1?"var(--k-green)":"var(--border)"), borderRadius:2, padding:24, textAlign:"left" }}>
                <div style={{ fontSize:12, color:"var(--fg-3)", textTransform:"uppercase", letterSpacing:"0.08em" }}>{n}</div>
                <div style={{ fontSize:32, color:"var(--fg-1)", margin:"8px 0" }}>{p}</div>
                <div style={{ fontSize:13 }}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {route === "changelog" && (
        <div style={{ padding:"56px 24px", maxWidth:820, margin:"0 auto" }}>
          <h1 style={{ fontSize:40, marginBottom:24 }}>changelog</h1>
          {[
            { v:"v1.4.2", d:"2026-04-18", items:["fix: worker restart loop on SIGTERM","perf: log tail 2x faster on linux"] },
            { v:"v1.4.1", d:"2026-04-09", items:["add: kernel rotate --all","fix: kernel.toml parse error with nested envs"] },
            { v:"v1.4.0", d:"2026-03-28", items:["add: multi-region deploys","add: offline mode","break: renamed `kernel status` columns"] },
          ].map(r => (
            <div key={r.v} style={{ borderTop:"1px solid var(--border)", padding:"16px 0" }}>
              <div style={{ display:"flex", gap:14, alignItems:"baseline" }}>
                <span style={{ fontSize:16, fontWeight:500 }}>{r.v}</span>
                <span style={{ fontSize:12, color:"var(--fg-3)" }}>{r.d}</span>
              </div>
              <ul style={{ fontSize:13, color:"var(--fg-2)", lineHeight:1.8, paddingLeft:20, marginTop:6 }}>
                {r.items.map((it,j)=><li key={j}>{it}</li>)}
              </ul>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script></body></html>
