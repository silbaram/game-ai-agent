<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.row { display: flex; gap: 12px; align-items: stretch; }
.swatch { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 2px; padding: 10px 12px; font-size: 11px; line-height: 1.4; }
.swatch .name { color: var(--fg-1); font-weight: 500; }
.swatch .hex { color: var(--fg-3); margin-top: 2px; font-size: 10px; letter-spacing: 0.02em; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 8px; }
</style>
</head><body><div class="card">
<div class="label">type · display & headings (JetBrains Mono)</div>
<div style="font-weight:700; font-size:40px; line-height:1.1; letter-spacing:-0.01em;">h1 · 40 / 700</div>
<div style="font-weight:700; font-size:28px; line-height:1.2; letter-spacing:-0.01em; margin-top:10px; color:var(--fg-1);">h2 · 28 / 700</div>
<div style="font-weight:500; font-size:20px; line-height:1.2; margin-top:10px;">h3 · 20 / 500</div>
<div style="font-weight:500; font-size:16px; line-height:1.3; margin-top:10px;">h4 · 16 / 500</div>
</div></body></html>
