<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
</style>
</head><body><div class="card">
<div class="label">window chrome · 36px toolbar</div>
<div style="border:1px solid var(--border); border-radius:2px; overflow:hidden; background:var(--bg-1);">
  <div style="height:36px; background:var(--bg-2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:12px;">
    <div style="display:flex; gap:6px;">
      <span style="width:12px; height:12px; border-radius:2px; background:var(--k-red); display:inline-block;"></span>
      <span style="width:12px; height:12px; border-radius:2px; background:var(--k-amber); display:inline-block;"></span>
      <span style="width:12px; height:12px; border-radius:2px; background:var(--k-green); display:inline-block;"></span>
    </div>
    <div style="color:var(--fg-2); font-size:12px;">~/kernel/projects/api — zsh — 90×24</div>
    <div style="margin-left:auto; display:flex; gap:14px; color:var(--fg-3); font-size:11px;">
      <span>● 3 tabs</span><span>main</span>
    </div>
  </div>
  <div style="padding:12px 16px; font-size:12px; line-height:1.6;">
    <div><span style="color:var(--k-green)">$ </span>git status</div>
    <div style="color:var(--fg-2)">On branch main</div>
    <div style="color:var(--fg-2)">nothing to commit, working tree clean</div>
    <div><span style="color:var(--k-green)">$ </span><span class="cursor" style="display:inline-block; width:9px; height:16px; background:var(--fg-1); vertical-align:-3px; animation:k-blink 1s steps(1,end) infinite;"></span></div>
  </div>
</div>
</div></body></html>
