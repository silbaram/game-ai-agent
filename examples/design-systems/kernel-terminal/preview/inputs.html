<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">inputs · fields</div>
<div style="display:flex; flex-direction:column; gap:10px;">
  <div style="display:flex; align-items:center; gap:8px; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:8px 12px;">
    <span style="color:var(--k-green); font-weight:500;">$</span>
    <span style="color:var(--fg-1);">kernel deploy --env=prod</span>
    <span class="cursor" style="background:var(--fg-1); width:0.55em; height:1em; display:inline-block; animation:k-blink 1s steps(1,end) infinite;"></span>
  </div>
  <div style="display:flex; align-items:center; gap:8px; background:var(--bg-1); border:1px solid var(--k-green); border-radius:2px; padding:8px 12px; box-shadow: 0 0 0 1px var(--k-green), 0 0 12px rgba(0,226,107,0.25);">
    <span style="color:var(--fg-3); font-size:11px;">focused</span>
    <span style="color:var(--fg-1); margin-left:auto;">search modules</span>
  </div>
  <div style="display:flex; align-items:center; gap:8px; background:var(--bg-1); border:1px solid var(--k-red); border-radius:2px; padding:8px 12px;">
    <span style="color:var(--k-red); font-size:11px;">error</span>
    <span style="color:var(--fg-2); margin-left:auto;">missing required --env</span>
  </div>
</div>
</div></body></html>
