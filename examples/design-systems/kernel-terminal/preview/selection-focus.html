<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
</style>
</head><body><div class="card">
<div class="label">selection & focus</div>
<div style="display:flex; flex-direction:column; gap:10px; font-size:13px;">
  <div style="background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:10px 12px;">
    text selection: <span style="background:rgba(0,226,107,0.22); color:var(--fg-1); padding:0 2px;">highlighted characters</span> use green-a, not a new color.
  </div>
  <div style="background:var(--bg-1); border:1px solid var(--k-green); border-radius:2px; padding:10px 12px; box-shadow: 0 0 0 1px var(--k-green), 0 0 12px rgba(0,226,107,0.25);">
    focused element: 1px accent border + subtle glow. that's it.
  </div>
  <div style="background:var(--bg-2); border:1px solid var(--border); border-radius:2px; padding:10px 12px;">
    list row · hover → bg-2 (+4% lightness), no border change
  </div>
</div>
</div></body></html>
