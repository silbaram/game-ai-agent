<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">radii · 0 or 2px only (no pill, no soft)</div>
<div style="display:flex; gap:24px; align-items:flex-end;">
  <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
       <div style="width:96px; height:64px; background:var(--bg-2); border:1px solid var(--border); border-radius:0px;"></div>
       <div style="font-size:12px; color:var(--fg-1);">r-0</div>
       <div style="font-size:10px; color:var(--fg-3);">0px</div>
     </div><div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
       <div style="width:96px; height:64px; background:var(--bg-2); border:1px solid var(--border); border-radius:2px;"></div>
       <div style="font-size:12px; color:var(--fg-1);">r-1</div>
       <div style="font-size:10px; color:var(--fg-3);">2px</div>
     </div><div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
       <div style="width:96px; height:64px; background:var(--bg-2); border:1px solid var(--border); border-radius:4px;"></div>
       <div style="font-size:12px; color:var(--fg-1);">r-2</div>
       <div style="font-size:10px; color:var(--fg-3);">4px (max)</div>
     </div>
  <div style="flex:1; font-size:11px; color:var(--fg-3); line-height:1.6;">
    터미널은 각져있음.<br/>pill / circular <span style="color:var(--k-red)">금지</span>.
  </div>
</div>
</div></body></html>
