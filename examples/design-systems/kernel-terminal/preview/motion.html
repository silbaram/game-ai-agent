<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
</style>
</head><body><div class="card">
<div class="label">motion · short, stepped</div>
<div style="display:flex; gap:18px; font-size:12px;">
  <div style="flex:1; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:12px;">
    <div style="color:var(--fg-1); font-weight:500; margin-bottom:8px;">cursor blink</div>
    <div style="color:var(--fg-3); font-size:10px; line-height:1.6;">
      1000ms<br/>
      steps(1, end)<br/>
      on/off 50:50
    </div>
    <div style="margin-top:10px; height:20px; display:flex; align-items:center;">
      <span style="display:inline-block; width:10px; height:18px; background:var(--fg-1); animation:k-blink 1s steps(1,end) infinite;"></span>
    </div>
  </div>
  <div style="flex:1; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:12px;">
    <div style="color:var(--fg-1); font-weight:500; margin-bottom:8px;">ui transition</div>
    <div style="color:var(--fg-3); font-size:10px; line-height:1.6;">
      140ms · --dur-ui<br/>
      cubic(0.2,0,0.2,1)<br/>
      opacity / bg only
    </div>
  </div>
  <div style="flex:1; background:var(--bg-1); border:1px solid var(--border); border-radius:2px; padding:12px;">
    <div style="color:var(--fg-1); font-weight:500; margin-bottom:8px;">spinner</div>
    <div style="color:var(--fg-3); font-size:10px; line-height:1.6;">
      80ms / step<br/>
      braille frames<br/>
      ⠋ → ⠏ looped
    </div>
  </div>
</div>
<div style="color:var(--fg-3); font-size:11px; margin-top:12px;">no spring · no bounce · no scale · no rotate (except spinner glyph swap)</div>
</div></body></html>
