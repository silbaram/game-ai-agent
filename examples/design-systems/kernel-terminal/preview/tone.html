<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
</style>
</head><body><div class="card">
<div class="label">content · tone samples</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px; font-size:12px;">
  <div style="background:var(--bg-1); border:1px solid var(--k-green); border-left:2px solid var(--k-green); border-radius:2px; padding:10px 12px; line-height:1.6;">
    <div style="font-size:10px; color:var(--k-green); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">good</div>
    <div style="color:var(--fg-1);">saved 3 files in 42ms</div>
    <div style="color:var(--fg-1); margin-top:6px;">error: missing KERNEL_TOKEN<br/>&nbsp;&nbsp;hint: run `kernel auth`</div>
  </div>
  <div style="background:var(--bg-1); border:1px solid var(--k-red); border-left:2px solid var(--k-red); border-radius:2px; padding:10px 12px; line-height:1.6;">
    <div style="font-size:10px; color:var(--k-red); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">avoid</div>
    <div style="color:var(--fg-2);">✨ Great news! Successfully saved your files!</div>
    <div style="color:var(--fg-2); margin-top:6px;">😢 Oops! Something went wrong...</div>
  </div>
</div>
<div style="font-size:11px; color:var(--fg-3); line-height:1.6; margin-top:10px;">
  lowercase · colon · short · no emoji · specific numbers · actionable hints
</div>
</div></body></html>
