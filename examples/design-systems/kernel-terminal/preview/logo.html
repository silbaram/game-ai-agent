<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">logo · mark + wordmark</div>
<div style="display:flex; align-items:center; gap:36px;">
  <div style="color:var(--fg-1);">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor">
      <rect x="1" y="1" width="46" height="46" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M10 16 L18 24 L10 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
      <rect x="22" y="30" width="16" height="2.5" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <div style="color:var(--k-green);">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor">
      <rect x="1" y="1" width="46" height="46" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M10 16 L18 24 L10 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
      <rect x="22" y="30" width="16" height="2.5" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <div style="color:var(--fg-1); font-family:var(--font-mono); font-size:36px; font-weight:700; letter-spacing:-0.02em;">kernel</div>
  <div style="color:var(--k-green); font-family:var(--font-mono); font-size:36px; font-weight:700; letter-spacing:-0.02em;">&gt;_</div>
</div>
<div style="font-size:10px; color:var(--fg-3); margin-top:14px;">monochrome fg-1 · accent green · wordmark lowercase mono</div>
</div></body></html>
