<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.row { display: flex; gap: 12px; align-items: stretch; }
.swatch { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 2px; padding: 10px 12px; font-size: 11px; line-height: 1.4; }
.swatch .name { color: var(--fg-1); font-weight: 500; }
.swatch .hex { color: var(--fg-3); margin-top: 2px; font-size: 10px; letter-spacing: 0.02em; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 8px; }
</style>
</head><body><div class="card">
<div class="label">accents · semantic (ansi-aligned)</div>
<div class="row">
  <div class="swatch" style="background:#00E26B"><div class="name" style="color:#0B0D0E">green / accent</div><div class="hex" style="color:#0B3A1A">#00E26B · $success</div></div>
  <div class="swatch" style="background:#FFB000"><div class="name" style="color:#0B0D0E">amber / warn</div><div class="hex" style="color:#3A2600">#FFB000 · $warn</div></div>
  <div class="swatch" style="background:#FF4D4D"><div class="name" style="color:#0B0D0E">red / error</div><div class="hex" style="color:#3A0E0E">#FF4D4D · $error</div></div>
</div>
<div style="height:12px"></div>
<div class="row">
  <div class="swatch" style="background:#5DD3FF"><div class="name" style="color:#0B0D0E">cyan / info</div><div class="hex" style="color:#0B2A3A">#5DD3FF · $info</div></div>
  <div class="swatch" style="background:#6C9BFF"><div class="name" style="color:#0B0D0E">blue</div><div class="hex" style="color:#0B1A3A">#6C9BFF</div></div>
  <div class="swatch" style="background:#E066E0"><div class="name" style="color:#0B0D0E">magenta</div><div class="hex" style="color:#3A0B3A">#E066E0 · rare</div></div>
</div>
</div></body></html>
