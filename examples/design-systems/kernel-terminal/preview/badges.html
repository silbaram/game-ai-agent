<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html, body { margin: 0; padding: 0; background: var(--bg-0); }
.card { box-sizing: border-box; width: 700px; padding: 20px; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-mono); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); margin-bottom: 12px; }
.row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
</style>
</head><body><div class="card">
<div class="label">status badges · squared, not pill</div>
<div style="display:flex; gap:10px; flex-wrap:wrap; font-size:12px;">
  <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border:1px solid var(--k-green); color:var(--k-green); border-radius:2px;">● running</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border:1px solid var(--border); color:var(--fg-3); border-radius:2px;">○ idle</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border:1px solid var(--k-amber); color:var(--k-amber); border-radius:2px;">◐ partial</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border:1px solid var(--k-red); color:var(--k-red); border-radius:2px;">✗ failed</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border:1px solid var(--k-cyan); color:var(--k-cyan); border-radius:2px;">i info</span>
</div>
<div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; font-size:11px;">
  <span style="background:var(--k-green-a); color:var(--k-green); padding:2px 7px; border-radius:2px;">+12 added</span>
  <span style="background:var(--k-red-a); color:var(--k-red); padding:2px 7px; border-radius:2px;">-4 removed</span>
  <span style="background:var(--k-amber-a); color:var(--k-amber); padding:2px 7px; border-radius:2px;">~2 modified</span>
  <span style="background:var(--bg-2); color:var(--fg-2); padding:2px 7px; border-radius:2px; border:1px solid var(--border);">v1.4.2</span>
</div>
</div></body></html>
