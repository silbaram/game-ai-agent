<!doctype html>
<html><head><meta charset="utf-8"><title>kernel — terminal</title>
<link rel="icon" href="../../assets/favicon.svg">
<style>
/* ==========================================================================
   Kernel Terminal Design System — colors & type tokens
   Dark-first. Monospace-first. 4px spacing grid.
   ========================================================================== */

@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");

:root {
  /* ----- Base palette (raw) ----- */
  --k-black: #0B0D0E;        /* root bg */
  --k-panel: #13161A;        /* card / panel bg */
  --k-panel-2: #1A1E23;      /* elevated panel */
  --k-panel-3: #22272E;      /* hovered panel */

  --k-ink-0: #FFFFFF;        /* hi-contrast */
  --k-ink-1: #E6E8EA;        /* body */
  --k-ink-2: #9AA3AD;        /* secondary */
  --k-ink-3: #5E6670;        /* muted */
  --k-ink-4: #3D434D;        /* very dim */
  --k-line:  #2A2F36;        /* borders */
  --k-line-2: #3D434D;       /* hover border */

  /* ----- Phosphor + ANSI accents ----- */
  --k-green:   #00E26B;      /* primary accent / prompt / focus */
  --k-green-d: #00B856;      /* pressed */
  --k-green-a: rgba(0, 226, 107, 0.18);

  --k-amber:   #FFB000;      /* warn / highlight */
  --k-amber-a: rgba(255, 176, 0, 0.18);

  --k-red:     #FF4D4D;      /* error */
  --k-red-a:   rgba(255, 77, 77, 0.18);

  --k-cyan:    #5DD3FF;      /* info / links */
  --k-cyan-a:  rgba(93, 211, 255, 0.18);

  --k-magenta: #E066E0;      /* rare accent */
  --k-blue:    #6C9BFF;      /* secondary info */

  /* ----- Semantic (map raw → role) ----- */
  --fg-1: var(--k-ink-1);
  --fg-2: var(--k-ink-2);
  --fg-3: var(--k-ink-3);
  --fg-4: var(--k-ink-4);
  --fg-accent: var(--k-green);

  --bg-0: var(--k-black);
  --bg-1: var(--k-panel);
  --bg-2: var(--k-panel-2);
  --bg-3: var(--k-panel-3);

  --border: var(--k-line);
  --border-hover: var(--k-line-2);
  --border-focus: var(--k-green);

  --success: var(--k-green);
  --warn:    var(--k-amber);
  --error:   var(--k-red);
  --info:    var(--k-cyan);

  /* Selection + focus */
  --selection-bg: var(--k-green-a);
  --focus-ring: var(--k-green);

  /* ----- Type families ----- */
  --font-mono: "JetBrains Mono", "IBM Plex Mono", "SF Mono", Menlo,
               Consolas, "Courier New", monospace;
  --font-sans: "IBM Plex Sans", "IBM Plex Sans KR", -apple-system,
               BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-kr-mono: "JetBrains Mono", "IBM Plex Sans KR", monospace; /* KR fallback when mono doesn't cover CJK */

  /* ----- Type scale (px) ----- */
  --fs-10: 10px;   /* micro / labels */
  --fs-12: 12px;   /* terminal default */
  --fs-13: 13px;   /* dense UI */
  --fs-14: 14px;   /* UI default */
  --fs-16: 16px;   /* body */
  --fs-20: 20px;   /* h3 */
  --fs-28: 28px;   /* h2 */
  --fs-40: 40px;   /* h1 / hero */
  --fs-56: 56px;   /* display */

  /* Line heights */
  --lh-tight: 1.2;
  --lh-ui:    1.4;
  --lh-mono:  1.5;
  --lh-prose: 1.6;

  /* Weights — JetBrains Mono ships 400/500/700 */
  --fw-regular: 400;
  --fw-medium:  500;
  --fw-bold:    700;

  /* ----- Spacing (4px base) ----- */
  --sp-0: 0px;
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 6px;
  --sp-4: 8px;
  --sp-5: 12px;
  --sp-6: 16px;
  --sp-7: 24px;
  --sp-8: 32px;
  --sp-9: 48px;
  --sp-10: 64px;

  /* ----- Radii ----- */
  --r-0: 0px;
  --r-1: 2px;
  --r-2: 4px;      /* cap — don't go higher */

  /* ----- Borders ----- */
  --bw: 1px;

  /* ----- Shadows (glow only; no drop shadows) ----- */
  --glow-focus: 0 0 0 1px var(--k-green), 0 0 12px rgba(0, 226, 107, 0.25);
  --glow-amber: 0 0 0 1px var(--k-amber), 0 0 12px rgba(255, 176, 0, 0.25);
  --glow-red:   0 0 0 1px var(--k-red),   0 0 12px rgba(255, 77, 77, 0.30);

  /* ----- Motion ----- */
  --dur-fast: 80ms;
  --dur-ui:   140ms;
  --dur-slow: 240ms;
  --ease-step: steps(1, end);
  --ease-linear: linear;
  --ease-ui: cubic-bezier(0.2, 0.0, 0.2, 1);

  /* Terminal cell (for character-grid thinking) */
  --cell-w: 7.2px;   /* at 14px mono */
  --cell-h: 21px;    /* 14 * 1.5 */
  --content-ch: 88ch;
}

/* ==========================================================================
   Semantic element styles
   Import this stylesheet and tokens + element rules are available.
   ========================================================================== */

html, body {
  background: var(--bg-0);
  color: var(--fg-1);
  font-family: var(--font-mono);
  font-size: var(--fs-14);
  line-height: var(--lh-mono);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection { background: var(--selection-bg); color: var(--fg-1); }

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-mono);
  font-weight: var(--fw-medium);
  line-height: var(--lh-tight);
  color: var(--fg-1);
  margin: 0;
  letter-spacing: -0.01em;
}
h1 { font-size: var(--fs-40); font-weight: var(--fw-bold); }
h2 { font-size: var(--fs-28); font-weight: var(--fw-bold); }
h3 { font-size: var(--fs-20); font-weight: var(--fw-medium); }
h4 { font-size: var(--fs-16); font-weight: var(--fw-medium); }
h5 { font-size: var(--fs-14); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-2); }
h6 { font-size: var(--fs-12); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); }

p  { margin: 0; font-size: var(--fs-14); color: var(--fg-1); }
.p-prose { font-family: var(--font-sans); font-size: var(--fs-16); line-height: var(--lh-prose); color: var(--fg-1); }

small, .caption {
  font-size: var(--fs-12);
  color: var(--fg-2);
}

code, pre, kbd, samp {
  font-family: var(--font-mono);
  font-size: 0.95em;
}

code {
  background: var(--bg-2);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-1);
  padding: 1px 6px;
  color: var(--fg-1);
}
pre {
  background: var(--bg-1);
  border: var(--bw) solid var(--border);
  border-radius: var(--r-1);
  padding: var(--sp-5) var(--sp-6);
  color: var(--fg-1);
  overflow: auto;
  line-height: var(--lh-mono);
}
pre code { background: transparent; border: 0; padding: 0; }

kbd {
  display: inline-block;
  padding: 0 6px;
  font-size: var(--fs-12);
  background: var(--bg-2);
  border: var(--bw) solid var(--border);
  border-bottom-width: 2px;
  border-radius: var(--r-1);
  color: var(--fg-2);
}

a {
  color: var(--k-cyan);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}
a:hover { color: var(--fg-1); }

hr { border: 0; border-top: var(--bw) solid var(--border); margin: var(--sp-6) 0; }

/* Prompt utility — wrap user input lines */
.prompt::before {
  content: "$ ";
  color: var(--k-green);
  font-weight: var(--fw-medium);
}
.prompt-root::before { content: "# "; color: var(--k-red); }
.prompt-modern::before { content: "\2771  "; color: var(--k-green); }

/* Cursor */
.cursor {
  display: inline-block;
  width: 0.55em;
  height: 1em;
  vertical-align: -0.15em;
  background: var(--fg-1);
  animation: k-blink 1s steps(1, end) infinite;
}
@keyframes k-blink { 50% { background: transparent; } }

/* Status badges */
.status { display: inline-flex; align-items: center; gap: 6px; font-size: var(--fs-12); font-weight: var(--fw-medium); }
.status::before { content: "●"; font-size: 10px; line-height: 1; }
.status-ok::before  { color: var(--success); }
.status-warn::before{ color: var(--warn); }
.status-err::before { color: var(--error); }
.status-info::before{ color: var(--info); }
.status-idle::before{ color: var(--fg-3); }

html,body,#root{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg-0);}
input::placeholder{color:var(--fg-4);} *{box-sizing:border-box;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
/* global React */

// ---------- StatusPill ----------
function StatusPill({ kind = "ok", children }) {
  const map = {
    ok:    { c: "var(--k-green)",  g: "●" },
    warn:  { c: "var(--k-amber)",  g: "◐" },
    err:   { c: "var(--k-red)",    g: "✗" },
    info:  { c: "var(--k-cyan)",   g: "i" },
    idle:  { c: "var(--fg-3)",     g: "○" },
  };
  const s = map[kind] ?? map.ok;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "2px 8px",
        border: `1px solid ${s.c}`, color: s.c, borderRadius: 2, fontSize: 11, lineHeight: 1.4 }}>
      <span style={{ fontSize: 10 }}>{s.g}</span>
      {children}
    </span>
  );
}

// ---------- Cursor ----------
function Cursor({ width = 9, height = 16, color = "var(--fg-1)" }) {
  return <span style={{ display: "inline-block", width, height, background: color,
    verticalAlign: "-3px", animation: "k-blink 1s steps(1,end) infinite", marginLeft: 2 }}/>;
}

// ---------- Prompt line ----------
function PromptLine({ cwd = "~", user = "kernel", value = "", showCursor = true, variant = "$" }) {
  const color = variant === "#" ? "var(--k-red)" : "var(--k-green)";
  return (
    <div style={{ display: "flex", gap: 8, alignItems: "baseline", fontSize: 13, lineHeight: 1.5 }}>
      <span style={{ color: "var(--fg-3)" }}>{user}@kernel</span>
      <span style={{ color: "var(--k-cyan)" }}>{cwd}</span>
      <span style={{ color, fontWeight: 500 }}>{variant}</span>
      <span style={{ color: "var(--fg-1)" }}>{value}</span>
      {showCursor && <Cursor />}
    </div>
  );
}

// ---------- Output line ----------
function OutputLine({ kind = "out", children }) {
  const map = {
    out:  { c: "var(--fg-1)", p: "" },
    dim:  { c: "var(--fg-2)", p: "  " },
    info: { c: "var(--k-cyan)", p: "  " },
    warn: { c: "var(--k-amber)", p: "  warn: " },
    err:  { c: "var(--k-red)", p: "  error: " },
    ok:   { c: "var(--k-green)", p: "  ok: " },
    hint: { c: "var(--fg-3)", p: "         hint: " },
  };
  const s = map[kind] ?? map.out;
  return <div style={{ color: s.c, fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{s.p}{children}</div>;
}

Object.assign(window, { StatusPill, Cursor, PromptLine, OutputLine });

/* global React */

// ---------- Window chrome ----------
function TerminalWindow({ title = "~/kernel — zsh — 100×32", tabs = ["main"], activeTab = "main", onTabClick, onAddTab, children, style }) {
  return (
    <div style={{ background: "var(--bg-1)", border: "1px solid var(--border)", borderRadius: 2,
      overflow: "hidden", display: "flex", flexDirection: "column", ...style }}>
      {/* title bar */}
      <div style={{ height: 36, background: "var(--bg-2)", borderBottom: "1px solid var(--border)",
        display: "flex", alignItems: "center", padding: "0 12px", gap: 12, flexShrink: 0 }}>
        <div style={{ display: "flex", gap: 6 }}>
          <span style={{ width: 12, height: 12, borderRadius: 2, background: "var(--k-red)" }}/>
          <span style={{ width: 12, height: 12, borderRadius: 2, background: "var(--k-amber)" }}/>
          <span style={{ width: 12, height: 12, borderRadius: 2, background: "var(--k-green)" }}/>
        </div>
        <div style={{ color: "var(--fg-2)", fontSize: 12, marginLeft: 8 }}>{title}</div>
        <div style={{ marginLeft: "auto", color: "var(--fg-3)", fontSize: 11 }}>
          <span style={{ color: "var(--k-green)" }}>●</span> kernel v1.4.2
        </div>
      </div>
      {/* tab bar */}
      <div style={{ height: 32, background: "var(--bg-1)", borderBottom: "1px solid var(--border)",
        display: "flex", alignItems: "stretch", fontSize: 12, flexShrink: 0 }}>
        {tabs.map(t => (
          <div key={t} onClick={() => onTabClick?.(t)} style={{
            padding: "0 14px", display: "flex", alignItems: "center", gap: 8, cursor: "pointer",
            borderRight: "1px solid var(--border)",
            background: t === activeTab ? "var(--bg-2)" : "transparent",
            color: t === activeTab ? "var(--fg-1)" : "var(--fg-3)",
            borderTop: t === activeTab ? "1px solid var(--k-green)" : "1px solid transparent",
          }}>
            <span style={{ fontSize: 10, color: "var(--k-green)" }}>●</span>
            {t}
          </div>
        ))}
        <div onClick={onAddTab} style={{ padding: "0 12px", display: "flex", alignItems: "center",
          color: "var(--fg-3)", cursor: "pointer" }}>+</div>
      </div>
      <div style={{ flex: 1, minHeight: 0, overflow: "auto" }}>
        {children}
      </div>
    </div>
  );
}

Object.assign(window, { TerminalWindow });

/* global React */

// ---------- Sidebar of past sessions ----------
function Sidebar({ sessions = [], active, onSelect }) {
  return (
    <div style={{ width: 220, background: "var(--bg-1)", borderRight: "1px solid var(--border)",
      display: "flex", flexDirection: "column", fontSize: 12 }}>
      <div style={{ padding: "14px 14px 8px", fontSize: 10, textTransform: "uppercase",
        letterSpacing: "0.08em", color: "var(--fg-3)" }}>sessions</div>
      <div style={{ flex: 1, overflow: "auto" }}>
        {sessions.map(s => (
          <div key={s.id} onClick={() => onSelect?.(s.id)} style={{
            padding: "8px 14px", cursor: "pointer",
            background: s.id === active ? "var(--k-green-a)" : "transparent",
            color: s.id === active ? "var(--fg-1)" : "var(--fg-2)",
            borderLeft: s.id === active ? "2px solid var(--k-green)" : "2px solid transparent",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <span>{s.title}</span>
              <span style={{ fontSize: 10, color: s.status === "running" ? "var(--k-green)" : "var(--fg-3)" }}>
                {s.status === "running" ? "●" : "○"}
              </span>
            </div>
            <div style={{ fontSize: 10, color: "var(--fg-3)", marginTop: 2 }}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ padding: 10, borderTop: "1px solid var(--border)", fontSize: 11, color: "var(--fg-3)" }}>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          <span>soyoung@kernel</span><span>⌘K</span>
        </div>
      </div>
    </div>
  );
}

// ---------- Status bar (bottom) ----------
function StatusBar({ branch = "main", dirty = false, mode = "insert", position = "L4:C12" }) {
  return (
    <div style={{ height: 24, background: "var(--bg-2)", borderTop: "1px solid var(--border)",
      display: "flex", alignItems: "center", padding: "0 10px", fontSize: 11, color: "var(--fg-2)", gap: 14 }}>
      <span style={{ color: "var(--k-green)" }}>● online</span>
      <span>⎇ {branch}{dirty && <span style={{ color: "var(--k-amber)" }}> *</span>}</span>
      <span>mode: {mode}</span>
      <span style={{ marginLeft: "auto" }}>{position}</span>
      <span>utf-8</span>
      <span>LF</span>
    </div>
  );
}

// ---------- Command palette (⌘K overlay) ----------
function CommandPalette({ open, onClose, items = [] }) {
  const [q, setQ] = React.useState("");
  if (!open) return null;
  const filtered = items.filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)",
      display: "flex", justifyContent: "center", paddingTop: 80, zIndex: 100 }}>
      <div onClick={e => e.stopPropagation()} style={{ width: 520, background: "var(--bg-1)",
        border: "1px solid var(--k-green)", borderRadius: 2, boxShadow: "0 0 0 1px var(--k-green), 0 0 24px rgba(0,226,107,0.25)" }}>
        <div style={{ padding: "10px 14px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: "var(--k-green)" }}>❯</span>
          <input autoFocus value={q} onChange={e => setQ(e.target.value)}
            placeholder="run a command..."
            style={{ flex: 1, background: "transparent", border: 0, outline: 0,
              color: "var(--fg-1)", fontFamily: "var(--font-mono)", fontSize: 14 }}/>
          <span style={{ fontSize: 10, color: "var(--fg-3)" }}>esc to close</span>
        </div>
        <div style={{ maxHeight: 320, overflow: "auto" }}>
          {filtered.map((it, i) => (
            <div key={it.name} style={{ padding: "8px 14px", display: "flex", alignItems: "center",
              justifyContent: "space-between", fontSize: 12,
              background: i === 0 ? "var(--k-green-a)" : "transparent",
              color: i === 0 ? "var(--fg-1)" : "var(--fg-2)" }}>
              <span>{it.name}</span>
              <span style={{ color: "var(--fg-3)", fontSize: 11 }}>{it.hint}</span>
            </div>
          ))}
          {filtered.length === 0 && (
            <div style={{ padding: "14px", color: "var(--fg-3)", fontSize: 12 }}>no matches</div>
          )}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Sidebar, StatusBar, CommandPalette });

/* global React */

// ---------- Service list table ----------
function ServiceList({ services = [], onAction }) {
  return (
    <div style={{ fontFamily: "var(--font-mono)", fontSize: 12 }}>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr 1fr 40px",
        padding: "6px 14px", color: "var(--fg-3)", fontSize: 10, textTransform: "uppercase",
        letterSpacing: "0.08em", borderBottom: "1px solid var(--border)" }}>
        <span>name</span><span>status</span><span>age</span><span>port</span><span>owner</span><span></span>
      </div>
      {services.map((s, i) => (
        <div key={s.name} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr 1fr 40px",
          padding: "8px 14px", borderBottom: "1px solid var(--border)",
          background: i % 2 ? "transparent" : "rgba(255,255,255,0.01)", color: "var(--fg-1)" }}>
          <span style={{ fontWeight: 500 }}>{s.name}</span>
          <span style={{ color: s.status === "running" ? "var(--k-green)" :
            s.status === "degraded" ? "var(--k-amber)" :
            s.status === "failed" ? "var(--k-red)" : "var(--fg-3)" }}>
            {s.status === "running" ? "● running" : s.status === "degraded" ? "◐ degraded" :
             s.status === "failed" ? "✗ failed" : "○ stopped"}
          </span>
          <span style={{ color: "var(--fg-2)" }}>{s.age || "—"}</span>
          <span style={{ color: "var(--fg-2)" }}>{s.port || "—"}</span>
          <span style={{ color: "var(--fg-2)" }}>{s.owner || "—"}</span>
          <span onClick={() => onAction?.(s)} style={{ color: "var(--fg-3)", cursor: "pointer", textAlign: "right" }}>…</span>
        </div>
      ))}
    </div>
  );
}

// ---------- Login gate ----------
function LoginGate({ onAuth }) {
  const [token, setToken] = React.useState("");
  const [err, setErr] = React.useState("");
  const submit = () => {
    if (!token) { setErr("token required"); return; }
    if (token.length < 4) { setErr("invalid token format"); return; }
    onAuth?.(token);
  };
  return (
    <div style={{ padding: 24, fontSize: 13, lineHeight: 1.6 }}>
      <pre style={{ margin: 0, color: "var(--k-green)", fontSize: 11, lineHeight: 1.2 }}>{`   _                        _
  | | _____ _ __ _ __   ___| |
  | |/ / _ \\ '__| '_ \\ / _ \\ |
  |   <  __/ |  | | | |  __/ |
  |_|\\_\\___|_|  |_| |_|\\___|_|   v1.4.2`}</pre>
      <div style={{ color: "var(--fg-2)", marginTop: 16 }}>welcome back. paste your access token to continue.</div>
      <div style={{ color: "var(--fg-3)", fontSize: 11, marginTop: 4 }}>create one at <span style={{ color: "var(--k-cyan)" }}>kernel.dev/tokens</span></div>

      <div style={{ marginTop: 20, display: "flex", alignItems: "center", gap: 8,
        background: "var(--bg-1)", border: `1px solid ${err ? "var(--k-red)" : "var(--k-green)"}`,
        padding: "10px 12px", borderRadius: 2,
        boxShadow: err ? "0 0 0 1px var(--k-red), 0 0 12px rgba(255,77,77,0.25)" :
          "0 0 0 1px var(--k-green), 0 0 12px rgba(0,226,107,0.25)" }}>
        <span style={{ color: "var(--k-green)" }}>$</span>
        <span style={{ color: "var(--fg-3)" }}>kernel auth --token</span>
        <input autoFocus value={token} onChange={e => { setToken(e.target.value); setErr(""); }}
          onKeyDown={e => e.key === "Enter" && submit()}
          placeholder="knl_..."
          style={{ flex: 1, background: "transparent", border: 0, outline: 0,
            color: "var(--fg-1)", fontFamily: "var(--font-mono)", fontSize: 13 }}/>
      </div>
      {err && <div style={{ color: "var(--k-red)", fontSize: 11, marginTop: 8 }}>error: {err}</div>}

      <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
        <button onClick={submit} style={{
          fontFamily: "inherit", fontSize: 13, fontWeight: 500,
          background: "var(--k-green)", color: "#071a0e", border: "1px solid var(--k-green)",
          padding: "8px 16px", borderRadius: 2, cursor: "pointer" }}>authenticate</button>
        <button onClick={() => onAuth?.("demo-token")} style={{
          fontFamily: "inherit", fontSize: 13,
          background: "transparent", color: "var(--fg-2)", border: "1px solid var(--border-hover)",
          padding: "8px 16px", borderRadius: 2, cursor: "pointer" }}>use demo</button>
      </div>
      <div style={{ marginTop: 20, color: "var(--fg-3)", fontSize: 11 }}>
        ─ or run in trial mode with <span style={{ color: "var(--k-cyan)" }}>kernel run --offline</span>
      </div>
    </div>
  );
}

Object.assign(window, { ServiceList, LoginGate });

/* global React, PromptLine, OutputLine, Cursor, TerminalWindow, Sidebar, StatusBar, CommandPalette, ServiceList, LoginGate */

const DEMO_SESSIONS = [
  { id: "s1", title: "main", sub: "4 services · 2h ago", status: "running" },
  { id: "s2", title: "deploy-prod", sub: "finished · 14m ago", status: "idle" },
  { id: "s3", title: "migrate-db", sub: "finished · yesterday", status: "idle" },
  { id: "s4", title: "logs/api", sub: "streaming", status: "running" },
];

const SERVICES = [
  { name: "api",       status: "running",  age: "4d3h", port: ":4001", owner: "soyoung" },
  { name: "worker",    status: "degraded", age: "4d3h", port: "—",     owner: "soyoung" },
  { name: "web",       status: "running",  age: "3h12m", port: ":3000", owner: "minho" },
  { name: "scheduler", status: "stopped",  age: "—",    port: "—",     owner: "—" },
  { name: "legacy-db", status: "failed",   age: "1h4m", port: ":5432", owner: "—" },
];

const PALETTE = [
  { name: "kernel deploy --env=prod", hint: "⏎" },
  { name: "kernel logs api --tail",   hint: "⏎" },
  { name: "kernel restart worker",    hint: "⏎" },
  { name: "kernel run build",         hint: "⏎" },
  { name: "kernel auth --rotate",     hint: "⏎" },
  { name: "kernel exit",              hint: "⌃D" },
];

// --- helpers ---
function typeLine(cmd, onDone) {
  // simulate typing one char at a time
  let i = 0;
  const out = { current: "" };
  const iv = setInterval(() => {
    out.current = cmd.slice(0, ++i);
    if (i >= cmd.length) { clearInterval(iv); onDone?.(); }
  }, 18);
  return out;
}

// --- Main session view ---
function TerminalSession({ authed, onLogout }) {
  const [activeTab, setActiveTab] = useState("main");
  const [tabs, setTabs] = useState(["main", "logs"]);
  const [activeSession, setActiveSession] = useState("s1");
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [input, setInput] = useState("");
  const [history, setHistory] = useState([
    { kind: "banner", content: "kernel v1.4.2 · connected to prod.us-west-2 · auth: soyoung" },
    { kind: "prompt", cwd: "~/kernel", value: "kernel status" },
    { kind: "table", data: SERVICES },
    { kind: "dim", content: "  5 services · 3 running · 1 degraded · 1 failed" },
  ]);
  const scrollRef = useRef(null);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setPaletteOpen(v => !v); }
      if (e.key === "Escape") setPaletteOpen(false);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [history]);

  const run = (cmd) => {
    const lines = [{ kind: "prompt", cwd: "~/kernel", value: cmd }];
    if (cmd.startsWith("kernel deploy")) {
      lines.push({ kind: "dim", content: "  → resolving 14 modules" });
      lines.push({ kind: "dim", content: "  → building api, worker, web" });
      lines.push({ kind: "warn", content: "worker has 1 unused import" });
      lines.push({ kind: "ok",   content: "built in 3.2s" });
      lines.push({ kind: "err",  content: "missing env KERNEL_TOKEN" });
      lines.push({ kind: "hint", content: "run `kernel auth` or set in .env" });
    } else if (cmd.startsWith("kernel logs")) {
      lines.push({ kind: "dim",  content: "  [api] 12:04:01 GET /v1/users 200 14ms" });
      lines.push({ kind: "dim",  content: "  [api] 12:04:01 GET /v1/auth  200 3ms" });
      lines.push({ kind: "warn", content: "[api] 12:04:02 slow query: users.find took 840ms" });
      lines.push({ kind: "dim",  content: "  [api] 12:04:03 POST /v1/jobs 201 22ms" });
    } else if (cmd.startsWith("kernel restart")) {
      lines.push({ kind: "dim", content: "  stopping worker..." });
      lines.push({ kind: "ok",  content: "worker restarted (pid 8842)" });
    } else if (cmd.startsWith("kernel status") || cmd === "status") {
      lines.push({ kind: "table", data: SERVICES });
    } else if (cmd === "clear") {
      setHistory([]); setInput(""); return;
    } else if (cmd === "exit" || cmd === "logout") {
      onLogout?.(); return;
    } else if (cmd.trim() === "") {
      // empty
    } else {
      lines.push({ kind: "err", content: `unknown command: ${cmd.split(" ")[0]}` });
      lines.push({ kind: "hint", content: "try `kernel --help` or press ⌘K" });
    }
    setHistory(h => [...h, ...lines]);
    setInput("");
  };

  const onPaletteRun = (cmd) => { setPaletteOpen(false); run(cmd); };

  return (
    <div style={{ display: "flex", height: "100%", minHeight: 0 }}>
      <Sidebar sessions={DEMO_SESSIONS} active={activeSession} onSelect={setActiveSession}/>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, position: "relative" }}>
        <TerminalWindow title={`~/kernel — zsh · ${tabs.length} tab${tabs.length>1?"s":""}`}
          tabs={tabs} activeTab={activeTab} onTabClick={setActiveTab}
          onAddTab={() => setTabs(t => [...t, `tab-${t.length+1}`])}
          style={{ flex: 1, minHeight: 0, borderRadius: 0, borderLeft: 0, borderRight: 0, borderBottom: 0 }}>
          <div ref={scrollRef} style={{ padding: "12px 16px", fontSize: 13, lineHeight: 1.5, height: "100%", overflow: "auto" }}>
            {history.map((l, i) => {
              if (l.kind === "banner") return <div key={i} style={{ color: "var(--fg-3)", fontSize: 11, paddingBottom: 8, borderBottom: "1px solid var(--border)", marginBottom: 10 }}>{l.content}</div>;
              if (l.kind === "prompt") return <PromptLine key={i} cwd={l.cwd} value={l.value} showCursor={false}/>;
              if (l.kind === "table") return <div key={i} style={{ margin: "6px 0 10px", border: "1px solid var(--border)", borderRadius: 2 }}><ServiceList services={l.data}/></div>;
              return <OutputLine key={i} kind={l.kind}>{l.content}</OutputLine>;
            })}
            {/* active input line */}
            <div style={{ display: "flex", gap: 8, alignItems: "baseline", marginTop: 6 }}>
              <span style={{ color: "var(--fg-3)" }}>soyoung@kernel</span>
              <span style={{ color: "var(--k-cyan)" }}>~/kernel</span>
              <span style={{ color: "var(--k-green)", fontWeight: 500 }}>$</span>
              <input autoFocus value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && run(input)}
                placeholder="try: kernel deploy --env=prod"
                style={{ flex: 1, background: "transparent", border: 0, outline: 0,
                  color: "var(--fg-1)", fontFamily: "var(--font-mono)", fontSize: 13, caretColor: "var(--k-green)" }}/>
            </div>
          </div>
        </TerminalWindow>
        <StatusBar branch="main" mode="insert" position={`L${history.length}:C${input.length+1}`}/>
        <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)}
          items={PALETTE.map(p => ({ ...p, onSelect: () => onPaletteRun(p.name) }))}/>
        {/* make palette selection clickable */}
        {paletteOpen && (
          <div style={{ position: "absolute", inset: 0, zIndex: 101, pointerEvents: "none" }}>
            <div style={{ position: "absolute", top: 80, left: "50%", transform: "translateX(-50%)",
              width: 520, pointerEvents: "auto" }}>
              {/* overlay runs via onClose through palette */}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// --- Top level app ---
function TerminalApp() {
  const [authed, setAuthed] = useState(false);
  return (
    <div style={{ width: "100%", height: "100vh", background: "var(--bg-0)", display: "flex", flexDirection: "column" }}>
      {!authed ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ width: 520, background: "var(--bg-1)", border: "1px solid var(--border)", borderRadius: 2 }}>
            <LoginGate onAuth={() => setAuthed(true)}/>
          </div>
        </div>
      ) : (
        <TerminalSession authed={authed} onLogout={() => setAuthed(false)}/>
      )}
    </div>
  );
}

window.TerminalApp = TerminalApp;

ReactDOM.createRoot(document.getElementById("root")).render(<TerminalApp/>);
</script></body></html>
